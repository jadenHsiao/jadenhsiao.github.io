baseURL = "https://jadenhsiao.gitee.io/"
DefaultContentLanguage = "zh" # Theme's display language, supports: en, fr, zh, zh-hant
languageCode = "en-us"
title = "JadenHsiao"
copyright = "Jadenhsiao. 本站遵循 CC-BY-NC 4.0 协议"
theme = "diary"
# googleAnalytics = "UA-123-45"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "perldoc"
    tabWidth = 4

[params]
subtitle = "Keep being brave,Debug the world."
enableGitalk = false

# Twitter Card and Open Graph settings
enableOpenGraph = true
enableTwitterCards = true
title = "My Blog" # will set 'og:site_name'
description = "My HomePage Description"  # will set 'og:description'

[params.gitalk]
  owner = "user"
  repo = "repo name"
  client_id = "your client id"
  client_secret = "your client secret"
[taxonomies]
   tag = "tags"
   category = "categories"

[params.utterances]
repo="your repo"
term="[ENTER TERM HERE]"
label="your label"
theme="github-light"

[[menu.main]]
url = "/categories"
name = "分类列表"
weight = 2
[[menu.main]]
url = "/about"
name = "关于作者"
weight = 3
[[menu.main]]
url = "/post"
name = "文章内容"
weight = 1
[[menu.main]]
url = "/index.xml"
name = "RSS Feed"
weight = 4
